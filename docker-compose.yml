services:
  gestor-tareas:
    platform: linux/arm64
    env_file:
      - .env
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: "3000"
      HTTPS_PORT: "3443"
      NODE_ENV: development
      DB_FILE: /app/data/data.db
      UPLOAD_DIR: /app/uploads
      BACKUP_DIR: /app/backups
      BACKUP_RETENTION_DAYS: "1"
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      FORCE_HTTPS: "true"
      HSTS_ENABLED: "true"
      PUBLIC_URL: https://localhost:3443
      SSL_CERT_PATH: /app/certs/cert.pem
      SSL_KEY_PATH: /app/certs/key.pem
    ports:
      - "3000:3000"
      - "3443:3443"
    command: node --watch src/server.js
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
      - ./data:/app/data
      - ./uploads:/app/uploads
      - ./certs:/app/certs:ro
      - /Volumes/ESSAGER/__Backups_Repositorios/gestor-tareas:/app/backups
    depends_on:
      - mailpit

  mailpit:
    image: axllent/mailpit
    restart: unless-stopped
    ports:
      - "8825:8025" # Interfaz Web (Cambiado a 8825 por conflicto)
    environment:
      MP_MAX_MESSAGES: 500
      MP_DATABASE: /data/mailpit.db
    volumes:
      - mailpit_data:/data

volumes:
  mailpit_data: